name: Production Monitor

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      MONITOR_FRONTEND_URL: https://www.dukapilot.com
      MONITOR_API_URL: https://dukapilotproduction.up.railway.app
      MONITOR_LOGIN_PHONE: ${{ secrets.MONITOR_LOGIN_PHONE }}
      MONITOR_LOGIN_PIN: ${{ secrets.MONITOR_LOGIN_PIN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run monitor:prod
      - name: Open monitoring alert issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Production monitor failure";
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            if (open.data.some((issue) => issue.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The scheduled monitor failed. Review [run ${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) and check Railway and Vercel status.`,
            });
