name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  android-wrapper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: chmod +x gradlew
      - run: ./gradlew :app:lintRelease :app:assembleDebug --no-daemon
      - name: Verify Android and trusted-web-app metadata
        run: |
          test -f app/build/outputs/apk/debug/app-debug.apk
          grep -q 'targetSdkVersion 36' app/build.gradle
          grep -q 'https://www.dukapilot.com/sales' android/twa-manifest.json
          grep -q 'https://www.dukapilot.com/inventory' android/twa-manifest.json
          grep -q 'https://www.dukapilot.com/debts' android/twa-manifest.json
          curl --fail --silent --show-error https://www.dukapilot.com/manifest.json | grep -q 'DukaPilot'
          curl --fail --silent --show-error https://www.dukapilot.com/.well-known/assetlinks.json | grep -q 'com.dukapilot.app'

  playwright-mocked:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: nohup npm run start >/tmp/dukapilot-frontend.log 2>&1 &
      - run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - run: npm run test:mocked
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - backend
          - frontend
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
