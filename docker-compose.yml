version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: dukapilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dukapilot_secret}
      POSTGRES_DB: dukapilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://dukapilot:${POSTGRES_PASSWORD:-dukapilot_secret}@db:5432/dukapilot
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      PORT: 4000
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
