<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DukaOS — Hakuna Mtandao</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f9fafb;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      text-align: center;
      max-width: 320px;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; color: #111827; margin: 0 0 0.5rem; }
    p  { font-size: 0.875rem; color: #6b7280; margin: 0 0 1.5rem; line-height: 1.5; }
    button {
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📵</div>
    <h1>Hakuna Mtandao</h1>
    <p>
      Huna muunganisho wa intaneti sasa hivi.<br />
      <em>You are currently offline.</em>
    </p>
    <button onclick="window.location.reload()">Jaribu tena / Retry</button>
  </div>
</body>
</html>
